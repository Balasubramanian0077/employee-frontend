<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <i class="fas fa-lock-open"></i>
                <h2>Set New Password</h2>
                <p>Enter your new password</p>
            </div>
            <form id="resetForm">
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="newPassword" placeholder="New Password" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-check-circle"></i>
                    <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
                </div>
                <button type="submit" class="btn-primary">Reset Password</button>
                <p class="auth-footer"><a href="login.html">Back to Login</a></p>
                <div id="message" class="message"></div>
            </form>
        </div>
    </div>
    <script>
        const email = localStorage.getItem('resetEmail');
        if (!email) window.location.href = 'forgot-password.html';
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = '';
            if (newPassword !== confirmPassword) {
                msgDiv.style.color = 'red';
                msgDiv.textContent = 'Passwords do not match.';
                return;
            }
            if (newPassword.length < 4) {
                msgDiv.style.color = 'red';
                msgDiv.textContent = 'Password must be at least 4 characters.';
                return;
            }
            try {
                const response = await fetch('http://localhost:8080/api/password-reset/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, newPassword })
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.error);
                msgDiv.style.color = 'green';
                msgDiv.textContent = 'Password reset successful! Redirecting...';
                localStorage.removeItem('resetEmail');
                setTimeout(() => window.location.href = 'login.html', 2000);
            } catch (err) {
                msgDiv.style.color = 'red';
                msgDiv.textContent = err.message;
            }
        });
    </script>
</body>
</html>
