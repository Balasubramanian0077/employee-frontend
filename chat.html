<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Chatbot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .chat-container {
            max-width: 800px;
            margin: 40px auto;
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 70vh;
        }
        .chat-header {
            background: #4f46e5;
            color: white;
            padding: 1rem;
            text-align: center;
            font-weight: 600;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .message {
            display: flex;
            gap: 0.5rem;
            max-width: 80%;
        }
        .user-message {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .bot-message {
            align-self: flex-start;
        }
        .message-bubble {
            background: #f1f5f9;
            padding: 0.75rem 1rem;
            border-radius: 18px;
            color: #1e293b;
            word-wrap: break-word;
        }
        .user-message .message-bubble {
            background: #4f46e5;
            color: white;
        }
        .chat-input {
            display: flex;
            gap: 0.5rem;
            padding: 1rem;
            border-top: 1px solid #e2e8f0;
            background: white;
        }
        .chat-input input {
            flex: 1;
            padding: 0.75rem;
            border: 1px solid #cbd5e1;
            border-radius: 40px;
            outline: none;
        }
        .chat-input button {
            background: #4f46e5;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 40px;
            color: white;
            cursor: pointer;
        }
        .loading {
            display: flex;
            justify-content: center;
            padding: 0.5rem;
            color: #4f46e5;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header"><i class="fas fa-robot"></i><h3>AI Assistant</h3></div>
            <div class="profile-name-sidebar">
                <i class="fas fa-user-circle"></i>
                <span id="sidebarUserName"></span>
            </div>
            <nav><ul>
                <li><a href="employee.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li class="active"><a href="chat.html"><i class="fas fa-comments"></i> AI Chat</a></li>
                <li><a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul></nav>
        </aside>
        <main class="main-content">
            <div class="top-nav">
                <h1>AI Chatbot</h1>
                <div class="profile"><span id="profileName"></span><i class="fas fa-user-circle"></i></div>
            </div>
            <div class="chat-container">
                <div class="chat-header">
                    <i class="fas fa-robot"></i> HR Assistant
                </div>
                <div class="chat-messages" id="chatMessages">
                    <div class="message bot-message">
                        <div class="message-bubble">Hello! I'm your HR assistant. Ask me about leave balance, attendance, or company policies.</div>
                    </div>
                </div>
                <div class="chat-input">
                    <input type="text" id="messageInput" placeholder="Type your question..." />
                    <button id="sendBtn"><i class="fas fa-paper-plane"></i> Send</button>
                </div>
                <div id="loading" class="loading" style="display: none;">AI is thinking...</div>
            </div>
        </main>
    </div>
    <script src="../js/auth.js"></script>
        <script src="../js/auth.js"></script>
    <script src="../js/chat.js"></script>
    <script>
        const employeeName = localStorage.getItem('fullName') || 'Employee';
        document.getElementById('sidebarUserName').innerText = employeeName;
        document.getElementById('profileName').innerText = employeeName;

        const chatMessages = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const loadingDiv = document.getElementById('loading');

        function addMessage(text, isUser) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
            messageDiv.innerHTML = `<div class="message-bubble">${text}</div>`;
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;
            addMessage(message, true);
            messageInput.value = '';
            loadingDiv.style.display = 'flex';
            try {
                const token = localStorage.getItem('token');
                const response = await fetch('http://localhost:8080/api/chat/send', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ message })
                });
                const data = await response.json();
                if (response.ok) {
                    addMessage(data.reply, false);
                } else {
                    addMessage('Error: ' + (data.reply || 'Something went wrong'), false);
                }
            } catch (err) {
                addMessage('Network error. Is the backend running?', false);
            } finally {
                loadingDiv.style.display = 'none';
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        function logout() { localStorage.clear(); window.location.href = '../index.html'; }
    </script>
</body>
</html>
