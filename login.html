<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Employee Management System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <i class="fas fa-building"></i>
                <h2>Welcome Back</h2>
                <p>Sign in with your email</p>
            </div>
            <form id="loginForm">
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" placeholder="Email" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Password" required>
                </div>
                <button type="submit" class="btn-primary">Login <i class="fas fa-arrow-right"></i></button>
                
                <!-- Forgot Password link (points to OTP flow) -->
                <p class="auth-footer"><a href="forgot-password.html">Forgot Password?</a></p>
                
                <p class="auth-footer">Don't have an account? <a href="register.html">Register here</a></p>
                <p class="auth-footer"><a href="index.html">← Back to Home</a></p>
                <div id="errorMessage" class="error-message"></div>
            </form>
        </div>
    </div>
    <script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const errorDiv = document.getElementById('errorMessage');
    errorDiv.textContent = '';

    try {
        const response = await fetch('http://localhost:8080/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });

        if (!response.ok) {
            errorDiv.textContent = 'Invalid email or password. Please try again.';
            return;
        }

        const data = await response.json();
        const token = data.token;

        // Decode role from JWT payload
        const payload = JSON.parse(atob(token.split('.')[1]));
        const role = payload.role;

        // Fetch current user details to get full name
        const userRes = await fetch('http://localhost:8080/api/users/me', {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const userData = await userRes.json();
        const fullName = userData.name;   // assuming the backend returns { name: "..." }

        localStorage.setItem('token', token);
        localStorage.setItem('role', role);
        localStorage.setItem('fullName', fullName);   // store full name
        localStorage.setItem('email', email);         // keep email if needed

        if (role === 'ADMIN') window.location.href = 'dashboard/admin.html';
        else if (role === 'MANAGER') window.location.href = 'dashboard/manager.html';
        else window.location.href = 'dashboard/employee.html';

    } catch (err) {
        errorDiv.textContent = 'Server error. Is the backend running on port 8080?';
    }
});
    </script>
</body>
</html>
