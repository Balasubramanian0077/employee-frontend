<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password - OTP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <i class="fas fa-key"></i>
                <h2>Forgot Password</h2>
                <p>Enter your registered email</p>
            </div>
            <form id="forgotForm">
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" placeholder="Email" required>
                </div>
                <button type="submit" class="btn-primary">Send OTP</button>
                <p class="auth-footer"><a href="login.html">Back to Login</a></p>
                <div id="message" class="message"></div>
            </form>
        </div>
    </div>
    <script>
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = '';
            try {
                const response = await fetch('http://localhost:8080/api/password-reset/send-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.error);
                localStorage.setItem('resetEmail', email);
                msgDiv.style.color = 'green';
                msgDiv.textContent = 'OTP sent! Redirecting...';
                setTimeout(() => window.location.href = 'verify-otp.html', 2000);
            } catch (err) {
                msgDiv.style.color = 'red';
                msgDiv.textContent = err.message;
            }
        });
    </script>
</body>
</html>
